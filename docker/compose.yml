# Buoy – ROS 2 Jazzy + rosbridge with host networking
# So hub and WiFi devices share the same DDS multicast domain.
# LLM services (ollama, whisper, llm_node) use profile "llm" – start with: docker compose --profile llm up -d
services:
  ros2_rosbridge:
    build:
      context: .
      dockerfile: Dockerfile.rosbridge
    platform: linux/arm64
    network_mode: host
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64
    network_mode: host
    volumes:
      - /opt/buoy/ollama:/root/.ollama
    environment:
      # Pi 5 (8GB): 2 models (Qwen + Moondream) stay loaded to avoid 30–60s switch delay
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_KEEP_ALIVE: "5m"
    restart: unless-stopped
    profiles:
      - llm

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    platform: linux/arm64
    network_mode: host
    restart: unless-stopped
    profiles:
      - llm

  llm_node:
    build:
      context: .
      dockerfile: Dockerfile.llm_node
    platform: linux/arm64
    network_mode: host
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      OLLAMA_HOST: "http://127.0.0.1:11434"
      WHISPER_URL: "http://127.0.0.1:9000/asr"
      LLM_MODEL: "${LLM_MODEL:-qwen2.5:1.5b}"
      LLM_VISION_MODEL: "${LLM_VISION_MODEL:-moondream}"
    restart: unless-stopped
    depends_on:
      - ollama
    profiles:
      - llm
