---
# Buoy – run on the Pi via ansible-pull or local ansible-playbook
# Usage: ansible-pull -U <repo_url> -C main -i localhost, -d /tmp/buoy playbook.yml
#    or: ansible-playbook -i localhost, -c local playbook.yml
- name: Configure Buoy hub
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - common
    - docker
    - role: local_dns
      when: wifi_ap_enable | default(true) | bool
    - role: wifi_ap
      when: wifi_ap_enable | default(true) | bool
    - ros2_docker
    - llm
    - command_center
    - role: captive_portal
      when: wifi_ap_enable | default(true) | bool and captive_portal_enable | default(false) | bool
    - first_boot
