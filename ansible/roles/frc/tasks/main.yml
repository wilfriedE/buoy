---
- name: Deploy buoy-frc start script (reads features.json, starts nt_bridge if frc enabled)
  ansible.builtin.template:
    src: start-frc-bridge.sh.j2
    dest: "{{ buoy_root }}/docker/start-frc-bridge.sh"
    mode: "0755"

- name: Deploy buoy-frc systemd unit (starts FRC bridge on boot if features.json has frc enabled)
  ansible.builtin.template:
    src: buoy-frc.service.j2
    dest: /etc/systemd/system/buoy-frc.service
    mode: "0644"

- name: Enable buoy-frc service
  ansible.builtin.systemd:
    name: buoy-frc
    enabled: true
    daemon_reload: true
