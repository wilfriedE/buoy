---
# .buoy TLD and maser.buoy for host dnsmasq (used by wifi_ap role)
- name: Ensure dnsmasq config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/dnsmasq.d
    - /opt/buoy/config/dnsmasq.d

- name: Deploy .buoy domain dnsmasq config
  ansible.builtin.template:
    src: buoy.conf.j2
    dest: /etc/dnsmasq.d/buoy_buoy.conf
    mode: "0644"

- name: Restart host dnsmasq if present (skip in Docker image build—no host dnsmasq)
  ansible.builtin.service:
    name: dnsmasq
    state: restarted
  when: not docker_image_build | default(false) | bool
  ignore_errors: true
