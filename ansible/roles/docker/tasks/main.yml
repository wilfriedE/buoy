---
- name: Install Docker dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'Debian'

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'Debian'

- name: Add Docker GPG key (signed-by keyring; apt-key is deprecated)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'Debian'

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'Debian'

- name: Install Docker and Docker Compose plugin (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'Debian'

- name: Add Docker dnf repository (Fedora/RHEL)
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'RedHat'

- name: Configure Docker dnf repository (Fedora)
  ansible.builtin.command:
    cmd: dnf config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'RedHat'
    - ansible_distribution == 'Fedora'
  changed_when: true

- name: Configure Docker dnf repository (RHEL/Rocky/Alma)
  ansible.builtin.command:
    cmd: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'RedHat'
    - ansible_distribution != 'Fedora'
  changed_when: true

- name: Install Docker and Docker Compose plugin (Fedora/RHEL)
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'RedHat'

- name: Ensure Docker service is started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add SSH user to docker group (run docker without sudo)
  ansible.builtin.user:
    name: "{{ buoy_ssh_user }}"
    groups: docker
    append: true
  when: buoy_ssh_user is defined and buoy_ssh_user | length > 0
