---
- name: Create Buoy directory
  ansible.builtin.file:
    path: "{{ buoy_root }}"
    state: directory
    mode: "0755"

- name: Copy Docker Compose and Dockerfile
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/"
    dest: "{{ buoy_root }}/docker"
    mode: "0644"

- name: Make rosbridge launch script executable
  ansible.builtin.file:
    path: "{{ buoy_root }}/docker/rosbridge_launch.sh"
    mode: "0755"

- name: Deploy ROS container systemd unit (starts soon after dockerd on boot)
  ansible.builtin.template:
    src: buoy-ros.service.j2
    dest: /etc/systemd/system/buoy-ros.service
    mode: "0644"

- name: Enable buoy-ros service
  ansible.builtin.systemd:
    name: buoy-ros
    enabled: true
    daemon_reload: true

- name: Allow DDS multicast on WiFi interface (ROS 2 discovery)
  ansible.builtin.shell: |
    iptables -C INPUT -i {{ wifi_interface }} -p udp -d 239.255.0.1 -j ACCEPT 2>/dev/null || \
    iptables -I INPUT -i {{ wifi_interface }} -p udp -d 239.255.0.1 -j ACCEPT
  changed_when: false
  when: wifi_interface is defined and wifi_ap_enable | default(true) | bool
  ignore_errors: true

- name: Allow DDS UDP port range (Fast DDS) on WiFi interface
  ansible.builtin.shell: |
    iptables -C INPUT -i {{ wifi_interface }} -p udp --dport 7400:7500 -j ACCEPT 2>/dev/null || \
    iptables -I INPUT -i {{ wifi_interface }} -p udp --dport 7400:7500 -j ACCEPT
  changed_when: false
  when: wifi_interface is defined and wifi_ap_enable | default(true) | bool
  ignore_errors: true

- name: Allow discovery server port on WiFi interface
  ansible.builtin.shell: |
    iptables -C INPUT -i {{ wifi_interface }} -p tcp --dport {{ ros_discovery_server_port }} -j ACCEPT 2>/dev/null || \
    iptables -I INPUT -i {{ wifi_interface }} -p tcp --dport {{ ros_discovery_server_port }} -j ACCEPT
  changed_when: false
  when: wifi_interface is defined and wifi_ap_enable | default(true) | bool and use_discovery_server | default(false) | bool
  ignore_errors: true

- name: Check for pre-saved Docker images tar (offline)
  ansible.builtin.stat:
    path: "{{ buoy_root }}/docker/docker_images.tar"
  register: docker_tar
  when: offline_first_boot | default(false) | bool

- name: Load Docker images from tar (offline first boot)
  ansible.builtin.shell: docker load -i docker_images.tar
  args:
    chdir: "{{ buoy_root }}/docker"
  when:
    - offline_first_boot | default(false) | bool
    - docker_tar.stat.exists | default(false) | bool
  ignore_errors: true

- name: Build ROS 2 image (during image build; docker_image_build=true, skip if pre-built)
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "{{ buoy_root }}/docker"
  environment:
    DOCKER_PLATFORM: "{{ docker_platform }}"
  when:
    - docker_image_build | default(false) | bool
    - not docker_image_prebuilt | default(false) | bool

- name: Start ROS 2 + rosbridge with Docker Compose (with build, requires network)
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ buoy_root }}/docker"
  environment:
    ROS_DOMAIN_ID: "{{ ros_domain_id }}"
    DOCKER_PLATFORM: "{{ docker_platform }}"
  register: compose_up
  changed_when: "'Creating' in compose_up.stdout or 'Starting' in compose_up.stdout or 'Building' in compose_up.stdout"
  failed_when: compose_up.rc != 0
  when:
    - not offline_first_boot | default(false) | bool
    - not docker_image_build | default(false) | bool

- name: Start ROS 2 + rosbridge with Docker Compose (offline, no build)
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ buoy_root }}/docker"
  environment:
    ROS_DOMAIN_ID: "{{ ros_domain_id }}"
    DOCKER_PLATFORM: "{{ docker_platform }}"
  register: compose_up_offline
  changed_when: "'Creating' in compose_up_offline.stdout or 'Starting' in compose_up_offline.stdout"
  failed_when: compose_up_offline.rc != 0
  when:
    - offline_first_boot | default(false) | bool
    - not docker_image_build | default(false) | bool
