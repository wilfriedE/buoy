---
- name: Install Node.js (Debian/Ubuntu)
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'Debian'

- name: Install Node.js (Fedora/RHEL)
  ansible.builtin.dnf:
    name: nodejs
    state: present
  when:
    - not offline_first_boot | default(false) | bool
    - ansible_os_family == 'RedHat'

- name: Enable pnpm via corepack (bundled with Node.js)
  ansible.builtin.command:
    cmd: corepack enable
  when: not offline_first_boot | default(false) | bool

- name: Prepare pnpm via corepack
  ansible.builtin.command:
    cmd: corepack prepare pnpm@latest --activate
  when: not offline_first_boot | default(false) | bool
  ignore_errors: true
  register: corepack_pnpm

- name: Install npm and pnpm (fallback if corepack unavailable)
  block:
    - name: Install npm (Debian/Ubuntu)
      ansible.builtin.apt:
        name: npm
        state: present
      when:
        - not offline_first_boot | default(false) | bool
        - ansible_os_family == 'Debian'

    - name: Install pnpm via npm
      ansible.builtin.command:
        cmd: npm install -g pnpm
      when: not offline_first_boot | default(false) | bool
  when:
    - not offline_first_boot | default(false) | bool
    - corepack_pnpm is failed

- name: Create command center directory
  ansible.builtin.file:
    path: "{{ buoy_root }}/command_center"
    state: directory
    mode: "0755"

- name: Ensure rsync is installed (for synchronize exclude)
  ansible.builtin.apt:
    name: rsync
    state: present
  when: ansible_os_family == 'Debian'

- name: Ensure rsync is installed (Fedora/RHEL)
  ansible.builtin.dnf:
    name: rsync
    state: present
  when: ansible_os_family == 'RedHat'

- name: Copy command center app (exclude node_modules for speed)
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../command_center/"
    dest: "{{ buoy_root }}/command_center"
    mode: push
    rsync_opts:
      - --exclude=node_modules

- name: Install command center dependencies with pnpm (requires network; skip when offline_first_boot)
  ansible.builtin.command:
    cmd: pnpm install
    chdir: "{{ buoy_root }}/command_center"
  changed_when: true
  when: not offline_first_boot | default(false) | bool

- name: Build command center assets (Tailwind, vendor JS for offline use)
  ansible.builtin.command:
    cmd: pnpm run build
    chdir: "{{ buoy_root }}/command_center"
  when: not offline_first_boot | default(false) | bool

- name: Deploy command center systemd unit
  ansible.builtin.template:
    src: buoy-command-center.service.j2
    dest: /etc/systemd/system/buoy-command-center.service
    mode: "0644"

- name: Start and enable command center service
  ansible.builtin.systemd:
    name: buoy-command-center
    state: started
    enabled: true
    daemon_reload: true
