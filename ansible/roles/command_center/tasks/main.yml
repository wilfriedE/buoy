---
- name: Install Node.js (requires network)
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  when: not offline_first_boot | default(false) | bool

- name: Enable pnpm via corepack (bundled with Node.js)
  ansible.builtin.command:
    cmd: corepack enable
  when: not offline_first_boot | default(false) | bool

- name: Prepare pnpm via corepack
  ansible.builtin.command:
    cmd: corepack prepare pnpm@latest --activate
  when: not offline_first_boot | default(false) | bool
  ignore_errors: true
  register: corepack_pnpm

- name: Install npm and pnpm (fallback if corepack unavailable)
  block:
    - name: Install npm
      ansible.builtin.apt:
        name: npm
        state: present
      when: not offline_first_boot | default(false) | bool

    - name: Install pnpm via npm
      ansible.builtin.command:
        cmd: npm install -g pnpm
      when: not offline_first_boot | default(false) | bool
  when:
    - not offline_first_boot | default(false) | bool
    - corepack_pnpm is failed

- name: Create command center directory
  ansible.builtin.file:
    path: "{{ maser_buoy_root }}/command_center"
    state: directory
    mode: "0755"

- name: Copy command center app (exclude node_modules for speed)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../command_center/"
    dest: "{{ maser_buoy_root }}/command_center"
    mode: "0644"
    exclude:
      - node_modules/

- name: Install command center dependencies with pnpm (requires network; skip when offline_first_boot)
  ansible.builtin.command:
    cmd: pnpm install
    chdir: "{{ maser_buoy_root }}/command_center"
  environment:
    NODE_ENV: production
  changed_when: true
  when: not offline_first_boot | default(false) | bool

- name: Deploy command center systemd unit
  ansible.builtin.template:
    src: maser-buoy-command-center.service.j2
    dest: /etc/systemd/system/maser-buoy-command-center.service
    mode: "0644"

- name: Start and enable command center service
  ansible.builtin.systemd:
    name: maser-buoy-command-center
    state: started
    enabled: true
    daemon_reload: true
