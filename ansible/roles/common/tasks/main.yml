---
- name: Enable SSH for remote access (e.g. over Ethernet)
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true
  ignore_errors: true

- name: Create SSH user with password (for headless login)
  ansible.builtin.user:
    name: "{{ buoy_ssh_user }}"
    password: "{{ buoy_ssh_password | password_hash('sha512') }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true
  when: buoy_ssh_user is defined and buoy_ssh_user | length > 0

- name: Disable userconfig first-boot prompt (we use maser, not pi)
  ansible.builtin.systemd:
    name: userconfig
    enabled: false
    state: stopped
  ignore_errors: true

- name: Remove pi user to reduce confusion
  ansible.builtin.user:
    name: pi
    state: absent
    remove: true

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ buoy_hostname }}"

- name: Ensure hostname in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ buoy_hostname }}"
  register: hosts_edit
  changed_when: hosts_edit.changed

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: not offline_first_boot | default(false) | bool

- name: Install common packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - python3-pip
    state: present
  when: not offline_first_boot | default(false) | bool
