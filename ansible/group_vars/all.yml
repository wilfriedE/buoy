# Buoy hub – shared variables

# Offline first boot: set to true when the Pi has no internet (e.g. field deployment).
# Image build must be done once WITH network and offline_first_boot: false so Docker, hostapd, images, and node_modules are installed; then image the SD. Baked image then boots with offline_first_boot: true.
offline_first_boot: true

buoy_hostname: buoy
buoy_domain: buoy
# SSH user for headless login (created by playbook)
buoy_ssh_user: maser
buoy_ssh_password: ChangeMe
# WiFi (native hostapd)
wifi_ssid: Buoy
wifi_passphrase: ChangeMe
wifi_country: US
wifi_interface: wlan0
# Upstream interface for WiFi AP NAT (WiFi clients → LAN/internet)
raspap_upstream_interface: eth0
# ROS 2
ros_domain_id: "0"
ros_bridge_port: 9090
ros_discovery_server_port: 11811
use_discovery_server: false
# Command center (80 = default HTTP, no port needed in URL)
command_center_port: 80
# Captive portal: when true, install Nodogsplash so new WiFi clients must pass a splash (command center) before full access. Set false for normal WiFi as soon as they connect.
captive_portal_enable: false
# Paths
buoy_root: /opt/buoy
