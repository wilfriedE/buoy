# Build Buoy SD image and create GitHub Release
# Manual trigger only (image build takes ~30-60 min)
name: Build Image and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      legacy:
        description: "Use Raspberry Pi OS Legacy (Bookworm) base"
        required: false
        type: boolean
        default: false
      include_llm:
        description: "Also build LLM variant (Ollama, Whisper, LLM node)"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write  # Required to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv sync

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Download base image
        run: |
          if [ "${{ github.event.inputs.legacy }}" = "true" ]; then
            uv run download-base --legacy
          else
            uv run download-base
          fi
        env:
          UV_COMPILE_BYTECODE: 0

      - name: Build image
        run: |
          if [ "${{ github.event.inputs.include_llm }}" = "true" ]; then
            uv run build-image --both
          else
            uv run build-image
          fi
        env:
          UV_COMPILE_BYTECODE: 0

      - name: Create manifest for release
        run: |
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}"
          uv run create-manifest --url "${REPO_URL}/buoy_build.img.xz"
          if [ -f build/buoy_build_llm.img ]; then
            uv run create-manifest --url "${REPO_URL}/buoy_build_llm.img.xz" build/buoy_build_llm.img
          fi
        env:
          UV_COMPILE_BYTECODE: 0

      - name: Compress image
        run: |
          cd build
          xz -z -9 -T0 buoy_build.img
          [ -f buoy_build_llm.img ] && xz -z -9 -T0 buoy_build_llm.img
          ls -lh *.xz *.rpi-imager-manifest 2>/dev/null || true

      - name: Create Release
        run: |
          FILES="build/buoy_build.img.xz build/buoy.rpi-imager-manifest"
          [ -f build/buoy_build_llm.img.xz ] && FILES="$FILES build/buoy_build_llm.img.xz"
          [ -f build/buoy_llm.rpi-imager-manifest ] && FILES="$FILES build/buoy_llm.rpi-imager-manifest"
          gh release create "${{ github.event.inputs.version }}" \
            --title "Buoy ${{ github.event.inputs.version }}" \
            --generate-notes \
            $FILES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
